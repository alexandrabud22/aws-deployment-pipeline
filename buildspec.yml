version: 0.2

phases:
  build:
    commands:
      - echo "Running automatic tests"
      - test -f index.html
      - test -f style.css
      - test -f app.js
      - test -s index.html
      - test -s style.css
      - grep -q "<title>" index.html
      - grep -q "stylesheet" index.html
      - grep -q "Alexandra" index.html
      - node --check app.js
      - echo "All tests passed"

  post_build:
    commands:
      - echo "Creating CloudFront invalidation"
      - aws cloudfront create-invalidation --distribution-id E1PIPU2M9VC517 --paths "/*"
      - echo "CloudFront invalidation created"

artifacts:
  files:
    - index.html
    - style.css
    - app.js